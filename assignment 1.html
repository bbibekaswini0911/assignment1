<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikachu Card</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .card{
      width:800px;
      height:420px;
      background:#ffd400;
      border-radius:20px;
      overflow:hidden;
      position:relative;
      display:flex;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .left{
      width:50%;
      padding:60px 40px;
      z-index:2;
    }

    .left h4{
      font-size:18px;
      color:#444;
      margin-bottom:10px;
    }

    .left h1{
      font-size:65px;
      margin-bottom:20px;
      color:black;
    }

    .left p{
      font-size:18px;
      line-height:28px;
      color:#333;
      margin-bottom:30px;
    }

    button{
      padding:14px 35px;
      border:none;
      border-radius:30px;
      background:black;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }


    .right{
      width:50%;
      position:relative;
    }

    .right img{
      width:420px;
      position:absolute;
      top:40px;
      right:20px;
    }

    .circle{
      width:250px;
      height:250px;
      border:10px solid rgba(255,255,255,0.3);
      border-radius:50%;
      position:absolute;
      bottom:-80px;
      left:-80px;
    }

  </style>

</head>
<body>

  <div class="card">

    <div class="left">

      <h4>Pokémon 025</h4>

      <h1>Pikachu</h1>

      <p>
        Pikachu is an Electric-type Pokémon introduced in Generation 1.
        Pikachu are small, chubby and incredibly cute.
      </p>

      <button>Explore</button>

    </div>

    <div class="right">

      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="pikachu">

    </div>

    <div class="circle"></div>

  </div>

</body>
</html>
